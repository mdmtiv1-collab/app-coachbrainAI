<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CoachBrain AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060608;
      --surface: #0c0c11;
      --surface-card: #12121a;
      --border: #1e1e2d;
      --orange: #e84e1b;
      --orange-glow: rgba(232, 78, 27, 0.35);
      --text: #ffffff;
      --text-muted: #8f9cae;
      --font: 'Plus Jakarta Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      height: -webkit-fill-available;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Onboarding Splash Screen */
    .splash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #181824 0%, #060608 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .splash-overlay.fade-out {
      opacity: 0;
      visibility: hidden;
    }
    .splash-card {
      background: rgba(18, 18, 26, 0.75);
      border: 1px solid rgba(232, 78, 27, 0.2);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 50px 30px;
      text-align: center;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 40px rgba(232, 78, 27, 0.05);
      transform: translateY(0);
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .splash-logo {
      font-size: 64px;
      margin-bottom: 20px;
      display: inline-block;
      filter: drop-shadow(0 0 15px var(--orange-glow));
    }
    .splash-title {
      font-size: 32px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }
    .splash-title span {
      color: var(--orange);
      text-shadow: 0 0 15px var(--orange-glow);
    }
    .splash-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 35px;
    }
    .splash-btn {
      width: 100%;
      background: linear-gradient(90deg, var(--orange), #ff6a39);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 800;
      padding: 18px;
      cursor: pointer;
      box-shadow: 0 8px 24px var(--orange-glow);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .splash-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(232, 78, 27, 0.5);
    }
    .splash-btn span {
      transition: transform 0.2s ease;
    }
    .splash-btn:hover span {
      transform: translateX(4px);
    }

    /* Main Container wrapper */
    .app-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      width: 100%;
    }

    /* Header & Lang Toggle */
    header {
      background-color: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-logo {
      font-size: 22px;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .brand-title span {
      color: var(--orange);
    }

    .lang-toggle {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px;
      display: flex;
      gap: 2px;
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .lang-btn.active {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 2px 8px var(--orange-glow);
    }

    /* Tabs Bar */
    .tabs-bar {
      display: flex;
      background-color: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 700;
      padding: 14px 10px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
    }

    .tab-btn.active {
      color: #fff;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: var(--orange);
      box-shadow: 0 -2px 10px var(--orange);
    }

    /* Main Content Area */
    .content-area {
      flex: 1;
      overflow-y: visible;
      padding: 20px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom));
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    select, input {
      width: 100%;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #fff;
      padding: 14px;
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
      -webkit-appearance: none;
    }

    select:focus, input:focus {
      border-color: var(--orange);
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▼';
      font-size: 10px;
      color: var(--text-muted);
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .action-btn {
      width: 100%;
      background: linear-gradient(90deg, var(--orange), #ff6a39);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 800;
      padding: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(232, 78, 27, 0.3);
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    /* Result Card */
    .result-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-top: 24px;
      text-align: left;
      display: none;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .result-title {
      font-size: 15px;
      font-weight: 800;
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .save-btn {
      background: rgba(232, 78, 27, 0.1);
      border: 1px solid var(--orange);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .save-btn:hover {
      background: var(--orange);
      box-shadow: 0 0 10px var(--orange-glow);
    }

    .result-body, .msg-text, #playbook-modal-text {
      font-size: 14px;
      line-height: 1.65;
      color: #e2e8f0;
    }
    .result-body h1, .msg-text h1, #playbook-modal-text h1 {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      margin: 16px 0 10px;
      border-bottom: 2px solid var(--orange);
      padding-bottom: 6px;
    }
    .result-body h2, .result-body h3, .msg-text h2, .msg-text h3, #playbook-modal-text h2, #playbook-modal-text h3 {
      font-size: 14.5px;
      font-weight: 800;
      color: var(--orange);
      background: rgba(232, 78, 27, 0.08);
      border-left: 4px solid var(--orange);
      padding: 8px 12px;
      border-radius: 6px;
      margin: 16px 0 10px;
      letter-spacing: 0.3px;
    }
    .result-body p, .msg-text p, #playbook-modal-text p {
      margin-bottom: 10px;
    }
    .result-body strong, .msg-text strong, #playbook-modal-text strong {
      color: #ffffff;
      font-weight: 700;
    }
    .result-body ul, .result-body ol, .msg-text ul, .msg-text ol, #playbook-modal-text ul, #playbook-modal-text ol {
      margin: 8px 0 12px 18px;
      padding: 0;
    }
    .result-body li, .msg-text li, #playbook-modal-text li {
      margin-bottom: 6px;
      color: #cbd5e1;
    }
    .time-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 2px 8px;
      border-radius: 50px;
      font-size: 11.5px;
      font-weight: 700;
      margin: 2px 4px;
    }
    .video-ref-badge {
      display: block;
      background: rgba(232, 78, 27, 0.12);
      border: 1px solid rgba(232, 78, 27, 0.3);
      color: #ff8c66;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      margin: 12px 0;
      box-shadow: 0 4px 12px rgba(232, 78, 27, 0.1);
    }

    /* Chat Tab Layout */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 120px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      margin: -20px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 85%;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.5;
      word-wrap: break-word;
      display: flex;
      flex-direction: column;
    }

    .message.user {
      background: var(--orange);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 10px rgba(232, 78, 27, 0.2);
    }

    .message.ai {
      background: var(--surface-card);
      border: 1px solid var(--border);
      color: #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg-save-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s ease;
      align-self: flex-end;
    }
    .msg-save-btn:hover {
      border-color: var(--orange);
      color: #fff;
    }

    .prompt-pills-container {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .prompt-pills-container::-webkit-scrollbar {
      display: none;
    }
    .prompt-pill {
      white-space: nowrap;
      background: var(--surface-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .prompt-pill:hover {
      border-color: var(--orange);
      color: #fff;
      background: rgba(232, 78, 27, 0.05);
    }

    .chat-input-area {
      background-color: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: #fff;
      padding: 12px 18px;
      font-family: var(--font);
      font-size: 14px;
      outline: none;
    }

    .send-btn {
      width: 42px;
      height: 42px;
      background: var(--orange);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--orange-glow);
    }

    /* Playbook Tab Styles */
    .playbook-header {
      margin-bottom: 24px;
      text-align: left;
    }
    .playbook-header h2 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .playbook-header p {
      font-size: 13px;
      color: var(--text-muted);
    }
    .playbook-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .playbook-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      height: 185px;
      position: relative;
    }
    .playbook-card:hover {
      border-color: var(--orange);
      transform: translateY(-2px);
    }
    .playbook-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .playbook-tag {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }
    .playbook-tag.planner {
      background: rgba(232, 78, 27, 0.1);
      color: var(--orange);
      border: 1px solid rgba(232, 78, 27, 0.2);
    }
    .playbook-tag.chat {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }
    .playbook-delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .playbook-delete-btn:hover {
      color: #ef4444;
    }
    .playbook-card-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .playbook-card-preview {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      flex-grow: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .playbook-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      font-size: 11px;
    }
    .playbook-card-date {
      color: var(--text-muted);
    }
    .playbook-card-action {
      color: var(--orange);
      font-weight: 700;
    }
    .playbook-empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted);
    }
    .playbook-empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .playbook-empty-state p {
      font-size: 13px;
    }

    /* Modal overlays */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(6, 6, 8, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }
    .modal-overlay.active .modal-content {
      transform: scale(1);
    }
    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
    }
    .modal-close-btn:hover {
      color: #fff;
    }

    .playbook-modal {
      max-width: 650px;
    }
    .playbook-modal-badge {
      font-size: 11px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .playbook-modal-badge.planner {
      background: rgba(232, 78, 27, 0.1);
      color: var(--orange);
    }
    .playbook-modal-badge.chat {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
    }
    .playbook-modal-content {
      background: rgba(6, 6, 8, 0.5);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-size: 13.5px;
      line-height: 1.6;
      white-space: pre-wrap;
      max-height: 50vh;
      overflow-y: auto;
      color: #e2e8f0;
      margin-bottom: 20px;
    }

    /* Loader */
    .loader {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background-color: var(--orange);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1.0); }
    }
  </style>
</head>
<body>

  <!-- Onboarding Splash Screen -->
  <div id="splash-screen" class="splash-overlay">
    <div class="splash-card">
      <div class="splash-logo">🏀</div>
      <h1 class="splash-title">Coach<span>Brain</span> AI</h1>
      <button class="splash-btn" id="splash-start-btn" onclick="startApp()">
        START PRACTICE / INICIAR ENTRENAMIENTO <span>➔</span>
      </button>
    </div>
  </div>

  <!-- Main Application Container -->
  <div id="app-container" class="app-container" style="display: none;">
    <header>
      <div class="brand">
        <span class="brand-logo">🏀</span>
        <div class="brand-title">Coach<span>Brain</span> AI</div>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('es')">ES</button>
      </div>
    </header>

    <div class="tabs-bar">
      <button id="tab-planner-btn" class="tab-btn active" onclick="switchTab('planner')">Practice Planner</button>
      <button id="tab-chat-btn" class="tab-btn" onclick="switchTab('chat')">Playbook AI Chat</button>
      <button id="tab-playbook-btn" class="tab-btn" onclick="switchTab('playbook')">My Playbook</button>
    </div>

    <div class="content-area">
      <!-- Planner Tab -->
      <div id="planner-tab" class="tab-content active">
        <div class="form-group">
          <label id="lbl-category">Team Category</label>
          <div class="select-wrapper">
            <select id="param-category">
              <!-- Rebuilt dynamically -->
            </select>
          </div>
        </div>

        <div class="form-group">
          <label id="lbl-level">Game Level</label>
          <div class="select-wrapper">
            <select id="param-level">

    function formatMarkdown(text) {
      if (!text) return '';
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Remove code fences if any
      html = html.replace(/```[a-z]*\n([\s\S]*?)\n```/gi, '$1');

      // Highlight video drills references: (Utiliza el Ejercicio X...) or (Use Drill X...)
      html = html.replace(/\((Utiliza el Ejercicio[^)]+|Utilise l'Exercice[^)]+|Use Drill[^)]+)\)/gi, function(match, p1) {
        return `<div class="video-ref-badge">🎬 ${p1}</div>`;
      });

      // Highlight time tags like (0-10 min) or [10 min] or (15 mins)
      html = html.replace(/(\(\d+[-–]\d+\s*min[s]?\)|\b\d+[-–]\d+\s*min[s]?\b|\[\d+\s*min[s]?\])/gi, function(match) {
        return `<span class="time-badge">⏱️ ${match.replace(/[()\[\]]/g, '')}</span>`;
      });

      // Section Headers: ### or ## or #
      html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

      // Bold text
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');

      // Italics text
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

      // Bullet lists
      html = html.replace(/^\s*[-*]\s+(.*$)/gim, '<li>$1</li>');
      html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
      html = html.replace(/<\/ul>\s*<ul>/g, '');

      // Numbered lists
      html = html.replace(/^\s*(\d+)\.\s+(.*$)/gim, '<li><strong>$1.</strong> $2</li>');

      // Line breaks & paragraphs
      const paragraphs = html.split(/\n\n+/);
      html = paragraphs.map(p => {
        p = p.trim();
        if (!p) return '';
        if (p.startsWith('<h') || p.startsWith('<ul') || p.startsWith('<div')) {
          return p;
        }
        return `<p>${p.replace(/\n/g, '<br>')}</p>`;
      }).join('\n');

      return html;
    }

    function setLanguage(lang) {
      currentLang = lang;
      
      // Update toggle buttons active state
      document.querySelectorAll('.lang-toggle .lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if(btn.textContent.toUpperCase() === lang.toUpperCase()) {
          btn.classList.add('active');
        }
      });

      const trans = translations[lang];
      if (!trans) return;

      const setElText = (id, val) => { const el = document.getElementById(id); if (el && val !== undefined) el.textContent = val; };
      const setElHtml = (id, val) => { const el = document.getElementById(id); if (el && val !== undefined) el.innerHTML = val; };
      const setElPlaceholder = (id, val) => { const el = document.getElementById(id); if (el && val !== undefined) el.placeholder = val; };

      setElText('tab-planner-btn', trans.plannerTab);
      setElText('tab-chat-btn', trans.chatTab);
      setElText('tab-playbook-btn', trans.playbookTab);
      
      setElText('lbl-category', trans.lblCategory);
      setElText('lbl-level', trans.lblLevel);
      setElText('lbl-duration', trans.lblDuration);
      setElText('lbl-focus', trans.lblFocus);
      setElText('btn-generate', trans.btnGenerate);
      setElText('lbl-result-title', trans.lblResultTitle);
      setElText('btn-copy', trans.btnCopy);
      setElPlaceholder('chat-input-field', trans.chatPlaceholder);

      setElText('splash-sub-text', trans.splashSubtitle);
      setElHtml('splash-start-btn', trans.btnStart);

      setElText('lbl-playbook-title', trans.playbookTab);
      setElText('lbl-playbook-subtitle', trans.lblNoSaved || '');

      // Welcome message in chat if empty
      const chatBox = document.getElementById('chat-box');
      if(chatBox && chatBox.children.length <= 1) {
        chatBox.innerHTML = `<div class="message ai" id="chat-welcome">${trans.chatWelcome}</div>`;
      }

      // Rebuild selectors options
      rebuildSelector('param-category', trans.categories);
      rebuildSelector('param-level', trans.levels);
      rebuildSelector('param-focus', trans.focuses);

      // Rebuild prompt pills
      const pillsContainer = document.getElementById('prompt-pills');
      if (pillsContainer && trans.pills) {
        pillsContainer.innerHTML = '';
        trans.pills.forEach(pill => {
          const btn = document.createElement('button');
          btn.className = 'prompt-pill';
          btn.textContent = pill.text;
          btn.onclick = () => {
            document.getElementById('chat-input-field').value = pill.prompt;
            sendChatMessage();
          };
          pillsContainer.appendChild(btn);
        });
      }
      
      renderPlaybook();
    }

    function rebuildSelector(id, options) {
      const select = document.getElementById(id);
      const activeVal = select.value;
      select.innerHTML = '';
      options.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt.val;
        option.textContent = opt.text;
        if(opt.val === activeVal) option.selected = true;
        select.appendChild(option);
      });
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      
      // Determine index based on tab name
      const tabIndices = { 'planner': 0, 'chat': 1, 'playbook': 2 };
      document.querySelectorAll('.tab-btn')[tabIndices[tab]].classList.add('active');

      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(tab + '-tab').classList.add('active');

      if(tab === 'playbook') {
        renderPlaybook();
      }
    }

    async function generatePracticePlan() {
      const category = document.getElementById('param-category').value;
      const level = document.getElementById('param-level').value;
      const duration = document.getElementById('param-duration').value;
      const focus = document.getElementById('param-focus').value;

      const loader = document.getElementById('planner-loader');
      const resultBox = document.getElementById('result-box');
      const resultText = document.getElementById('result-text');
      const saveBtn = document.getElementById('btn-save-planner');

      loader.style.display = 'flex';
      resultBox.style.display = 'none';
      saveBtn.style.display = 'none';

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'planner',
            language: currentLang,
            category,
            level,
            duration,
            focus
          })
        });

        const resData = await response.json();
        if (resData.error) {
          resultText.textContent = "Error: " + resData.error;
        } else {
          resultText._rawText = resData.result;
          resultText.innerHTML = formatMarkdown(resData.result);
          saveBtn.style.display = 'inline-block';
        }
        resultBox.style.display = 'block';
        setTimeout(() => {
          resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      } catch(e) {
        resultText.textContent = currentLang === 'es' ? "Error al conectar con la IA." : (currentLang === 'fr' ? "Erreur de connexion avec l'IA." : (currentLang === 'pt' ? "Falha ao conectar com a IA." : "Failed to connect to the AI."));
        resultBox.style.display = 'block';
        setTimeout(() => {
          resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      } finally {
        loader.style.display = 'none';
      }
    }

    function copyResult() {
      const resultText = document.getElementById('result-text');
      const text = resultText._rawText || resultText.textContent;
      navigator.clipboard.writeText(text);
      const copyBtn = document.getElementById('btn-copy');
      const originalText = copyBtn.textContent;
      copyBtn.textContent = currentLang === 'pt' ? 'Copiado!' : (currentLang === 'es' ? '¡Copiado!' : (currentLang === 'fr' ? 'Copié !' : 'Copied!'));
      setTimeout(() => { copyBtn.textContent = originalText; }, 1800);
    }

    function savePlannerResult() {
      const resultText = document.getElementById('result-text');
      const text = resultText._rawText || resultText.textContent;
      if (!text) return;
      
      const catText = document.getElementById('param-category').options[document.getElementById('param-category').selectedIndex].text;
      const focusText = document.getElementById('param-focus').options[document.getElementById('param-focus').selectedIndex].text;
      const title = `${catText} - ${focusText}`;
      
      saveToPlaybook(title, text, 'planner');
      
      const saveBtn = document.getElementById('btn-save-planner');
      const originalText = saveBtn.textContent;
      saveBtn.textContent = translations[currentLang].lblSaved;
      saveBtn.style.borderColor = '#15803d';
      saveBtn.style.color = '#15803d';
      
      setTimeout(() => {
        saveBtn.textContent = originalText;
        saveBtn.style.borderColor = '';
        saveBtn.style.color = '';
      }, 2000);
    }

    async function sendChatMessage() {

      userBubble.className = 'message user';
      userBubble.textContent = messageText;
      chatBox.appendChild(userBubble);
      chatBox.scrollTop = chatBox.scrollHeight;

      // Append loading bubble
      const loadingBubble = document.createElement('div');
      loadingBubble.className = 'message ai';
      loadingBubble.innerHTML = '<div class="loader" style="display:flex"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      chatBox.appendChild(loadingBubble);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'chat',
            language: currentLang,
            message: messageText
          })
        });

        const resData = await response.json();
        chatBox.removeChild(loadingBubble);

        const aiBubble = document.createElement('div');
        aiBubble.className = 'message ai';
        aiBubble._rawText = resData.result;
        if (resData.error) {
          aiBubble.textContent = "Error: " + resData.error;
        } else {
          aiBubble.innerHTML = `
            <div class="msg-text">${formatMarkdown(resData.result)}</div>
            <button class="msg-save-btn" onclick="saveChatBubble(this)">💾 ${translations[currentLang].btnSave || 'Save'}</button>
          `;
        }
        chatBox.appendChild(aiBubble);
        chatBox.scrollTop = chatBox.scrollHeight;

      } catch(e) {
        chatBox.removeChild(loadingBubble);
        const aiBubble = document.createElement('div');
        aiBubble.className = 'message ai';
        aiBubble.textContent = currentLang === 'es' ? "Error al conectar." : (currentLang === 'fr' ? "Erreur de connexion." : (currentLang === 'pt' ? "Falha na conexão." : "Connection failed."));
        chatBox.appendChild(aiBubble);
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }

    function saveChatBubble(btn) {
      const bubble = btn.parentElement;
      const text = bubble._rawText || (btn.previousElementSibling ? btn.previousElementSibling.textContent : '');
      const prevBubble = bubble.previousElementSibling;
      let title = "Saved Chat Answer";
      if (prevBubble && prevBubble.classList.contains('user')) {
        title = prevBubble.textContent;
        if (title.length > 30) title = title.substring(0, 30) + "...";
      }
      
      saveToPlaybook(title, text, 'chat');
      
      const originalText = btn.innerHTML;
      btn.textContent = translations[currentLang].lblSaved;
      btn.style.borderColor = '#15803d';
      btn.style.color = '#15803d';
      setTimeout(() => {
        btn.innerHTML = originalText;
        btn.style.borderColor = '';
        btn.style.color = '';
      }, 2000);
    }

    // Playbook Storage Operations
    function getPlaybook() {
      return JSON.parse(localStorage.getItem('coachbrain_playbook') || '[]');
    }

    function saveToPlaybook(title, content, type) {
      const playbook = getPlaybook();
      const newItem = {
        id: 'pb_' + Date.now(),
        title: title || (type === 'planner' ? 'Practice Plan' : 'Tactical Answer'),
        content: content,
        type: type,
        date: new Date().toLocaleDateString(currentLang === 'pt' ? 'pt-BR' : (currentLang === 'es' ? 'es-ES' : 'en-US'), {
          day: 'numeric',
          month: 'short',
          hour: '2-digit',
          minute: '2-digit'
        })
      };
      playbook.unshift(newItem);
      localStorage.setItem('coachbrain_playbook', JSON.stringify(playbook));
      renderPlaybook();
    }

    function deletePlaybookItem(id, event) {
      if(event) event.stopPropagation();
      let playbook = getPlaybook();
      playbook = playbook.filter(item => item.id !== id);
      localStorage.setItem('coachbrain_playbook', JSON.stringify(playbook));
      renderPlaybook();
    }

    function renderPlaybook() {
      const list = document.getElementById('playbook-list');
      const playbook = getPlaybook();
      
      if(playbook.length === 0) {
        list.innerHTML = `
          <div class="playbook-empty-state">
            <div class="empty-icon">🗂️</div>
            <p>${translations[currentLang].lblNoSaved}</p>
          </div>
        `;
        return;
      }

      list.innerHTML = '';
      playbook.forEach(item => {
        const card = document.createElement('div');
        card.className = 'playbook-card';
        card.onclick = () => viewPlaybookItem(item.id);
        
        const typeLabel = item.type === 'planner' 
          ? (currentLang === 'pt' ? 'Plano de Treino' : (currentLang === 'es' ? 'Plan de Entreno' : 'Practice Plan'))
          : (currentLang === 'pt' ? 'Resposta Tática' : (currentLang === 'es' ? 'Respuesta Táctica' : 'Tactical Answer'));
          
        card.innerHTML = `
          <div class="playbook-card-header">
            <span class="playbook-tag ${item.type}">${typeLabel}</span>
            <button class="playbook-delete-btn" onclick="deletePlaybookItem('${item.id}', event)">✕</button>
          </div>
          <h3 class="playbook-card-title">${item.title}</h3>
          <p class="playbook-card-preview">${item.content.substring(0, 120)}...</p>
          <div class="playbook-card-footer">
            <span class="playbook-card-date">${item.date}</span>
            <span class="playbook-card-action">View ➔</span>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function viewPlaybookItem(id) {
      const playbook = getPlaybook();
      const item = playbook.find(i => i.id === id);
      if(!item) return;

      document.getElementById('playbook-modal-title').textContent = item.title;
      const badge = document.getElementById('playbook-modal-badge');
      badge.textContent = item.type === 'planner' 
        ? (currentLang === 'pt' ? 'Plano' : (currentLang === 'es' ? 'Plan' : 'Plan'))
        : (currentLang === 'pt' ? 'Chat' : (currentLang === 'es' ? 'Chat' : 'Chat'));
      badge.className = 'playbook-modal-badge ' + item.type;
      
      document.getElementById('playbook-modal-text').innerHTML = formatMarkdown(item.content);
      
      const modal = document.getElementById('playbookModal');
      modal.style.display = 'flex';
      setTimeout(() => {
        modal.classList.add('active');
      }, 10);
    }

    function closePlaybookModal() {
      const modal = document.getElementById('playbookModal');
      modal.classList.remove('active');
      setTimeout(() => {
        modal.style.display = 'none';
      }, 300);
    }

    function copyPlaybookModalText() {
      const text = document.getElementById('playbook-modal-text').textContent;
      navigator.clipboard.writeText(text);
      const copyBtn = document.getElementById('playbook-modal-copy');
      const originalText = copyBtn.textContent;
      copyBtn.textContent = currentLang === 'pt' ? 'Copiado!' : (currentLang === 'es' ? '¡Copiado!' : 'Copied!');
      setTimeout(() => { copyBtn.textContent = originalText; }, 1800);
    }

    document.addEventListener('DOMContentLoaded', () => {
      setLanguage('en'); // Default language set to English
      const splashBtn = document.getElementById('splash-start-btn');
      if (splashBtn) {
        splashBtn.addEventListener('click', startApp);
      }
    });
  </script>
</body>
</html>
